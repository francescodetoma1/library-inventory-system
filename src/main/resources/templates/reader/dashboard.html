<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reader Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Welcome, <span th:text="${username}"></span>!</h2>
    <a href="/logout" class="btn btn-outline-danger">Logout</a>
</div>

<!-- MY RESERVATIONS -->
<h4>My Reservations</h4>
<div th:if="${#lists.isEmpty(myReservations)}" class="alert alert-info">You have no active reservations.</div>
<table th:if="${!#lists.isEmpty(myReservations)}" class="table table-bordered mb-5">
    <thead class="table-warning">
    <tr>
        <th>Cover</th>
        <th>Title</th>
        <th>Author</th>
        <th>From</th>
        <th>To</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${myReservations}">
        <td>
            <img th:src="${book.coverUrl}" alt="cover"
                 style="width:50px; height:70px; object-fit:cover;"
                 onerror="this.src='https://via.placeholder.com/50x70?text=No+Cover'">
        </td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.reservationStart}"></td>
        <td th:text="${book.reservationEnd}"></td>
        <td>
            <button class="btn btn-sm btn-danger"
                    th:onclick="'cancelReservation(' + ${book.id} + ')'">Cancel</button>
        </td>
    </tr>
    </tbody>
</table>

<!-- ALL BOOKS -->
<h4>All Books</h4>

<!-- SEARCH AND FILTERS -->
<div class="row g-2 mb-3">
    <div class="col-md-5">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by title, author or category...">
    </div>
    <div class="col-md-3">
        <select id="statusFilter" class="form-select">
            <option value="ALL">All statuses</option>
            <option value="AVAILABLE">Available</option>
            <option value="RESERVED">Reserved</option>
        </select>
    </div>
    <div class="col-md-3">
        <select id="categoryFilter" class="form-select">
            <option value="ALL">All categories</option>
            <option value="Fiction">Fiction</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Horror">Horror</option>
            <option value="Poetry">Poetry</option>
            <option value="Classic">Classic</option>
            <option value="Philosophy">Philosophy</option>
            <option value="Comics">Comics</option>
            <option value="Manga">Manga</option>
        </select>
    </div>
    <div class="col-md-1">
        <button class="btn btn-secondary w-100" onclick="resetFilters()">Reset</button>
    </div>
</div>

<div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3" id="booksTable">
    <div class="col" th:each="book : ${books}"
         th:data-status="${book.status.name()}"
         th:data-category="${book.category}">
        <div class="card h-100 shadow-sm">
            <img th:src="${book.coverUrl}"
                 class="card-img-top"
                 alt="cover"
                 style="height: 200px; object-fit: cover;"
                 onerror="this.src='https://via.placeholder.com/150x200?text=No+Cover'">
            <div class="card-body p-2">
                <h6 class="card-title mb-1" th:text="${book.title}" style="font-size:0.85rem;"></h6>
                <p class="card-text text-muted mb-1" th:text="${book.author}" style="font-size:0.75rem;"></p>
                <p class="card-text text-muted mb-1" th:text="${book.category}" style="font-size:0.70rem;"></p>
                <span class="badge mb-2"
                      th:classappend="${book.status.name() == 'AVAILABLE'} ? 'bg-success' : 'bg-danger'"
                      th:text="${book.status.name() == 'AVAILABLE'} ? 'Available' : 'Reserved'"></span>
                <div>
                    <button th:if="${book.status.name() == 'AVAILABLE'}"
                            class="btn btn-sm btn-primary w-100"
                            th:onclick="'openReserveModal(' + ${book.id} + ')'">Reserve</button>
                    <span th:if="${book.status.name() == 'RESERVED'}"
                          class="text-muted" style="font-size:0.75rem;">Unavailable</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- RESERVE MODAL -->
<div class="modal fade" id="reserveModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Reserve Book</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="bookId">
                <div class="mb-3">
                    <label>Start Date</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="mb-3">
                    <label>End Date</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
                <div id="reservationError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="confirmReservation()">Confirm</button>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted mt-5 mb-3" style="font-size:0.75rem;">
    Library Inventory Management System &copy; 2026 Francesco De Toma
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').min = today;
    document.getElementById('endDate').min = today;

    function applyFilters() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const category = document.getElementById('categoryFilter').value;

        document.querySelectorAll('#booksTable .col').forEach(card => {
            const text = card.innerText.toLowerCase();
            const cardStatus = card.dataset.status;
            const cardCategory = card.dataset.category;

            const matchesSearch = text.includes(query);
            const matchesStatus = status === 'ALL' || cardStatus === status;
            const matchesCategory = category === 'ALL' || cardCategory === category;

            card.style.display = (matchesSearch && matchesStatus && matchesCategory) ? '' : 'none';
        });
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('statusFilter').value = 'ALL';
        document.getElementById('categoryFilter').value = 'ALL';
        applyFilters();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);
    document.getElementById('categoryFilter').addEventListener('change', applyFilters);

    function openReserveModal(bookId) {
        document.getElementById('bookId').value = bookId;
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('reservationError').classList.add('d-none');
        new bootstrap.Modal(document.getElementById('reserveModal')).show();
    }

    function confirmReservation() {
        const bookId = document.getElementById('bookId').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const errorDiv = document.getElementById('reservationError');

        if (!startDate || !endDate) {
            errorDiv.textContent = 'Please select both start and end date.';
            errorDiv.classList.remove('d-none');
            return;
        }

        fetch(`/api/books/${bookId}/reserve`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ startDate, endDate })
        }).then(async res => {
            if (res.ok) {
                location.reload();
            } else {
                const error = await res.text();
                errorDiv.textContent = error;
                errorDiv.classList.remove('d-none');
            }
        });
    }

    function cancelReservation(bookId) {
        if (confirm('Cancel this reservation?')) {
            fetch(`/api/books/${bookId}/cancel`, { method: 'PATCH' })
                .then(res => { if (res.ok) location.reload(); });
        }
    }
</script>
</body>
</html>
