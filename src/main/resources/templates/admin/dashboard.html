<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Admin Dashboard</h2>
    <a href="/logout" class="btn btn-outline-danger">Logout</a>
</div>

<!-- STATS -->
<div class="row mb-4">
    <div class="col-md-4">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5>Total Books</h5>
                <h2 th:text="${books.size()}"></h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success">
            <div class="card-body">
                <h5>Total Users</h5>
                <h2 th:text="${users.size()}"></h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-warning">
            <div class="card-body">
                <h5>Reserved Books</h5>
                <h2 th:text="${reservedCount}"></h2>
            </div>
        </div>
    </div>
</div>

<!-- ADD BOOK FORM -->
<div class="card mb-4">
    <div class="card-header"><strong>Add New Book</strong></div>
    <div class="card-body">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" id="newTitle" class="form-control" placeholder="Title">
            </div>
            <div class="col-md-3">
                <input type="text" id="newAuthor" class="form-control" placeholder="Author">
            </div>
            <div class="col-md-3">
                <input type="text" id="newCategory" class="form-control" placeholder="Category">
            </div>
            <div class="col-md-3">
                <button class="btn btn-success w-100" onclick="addBook()">Add Book</button>
            </div>
        </div>
    </div>
</div>

<!-- BOOKS TABLE -->
<h4>Book Inventory</h4>
<input type="text" id="searchInput" class="form-control mb-3" placeholder="Search books...">
<table class="table table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>Status</th>
        <th>Reserved By</th>
        <th>From</th>
        <th>To</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="booksTable">
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.category}"></td>
        <td>
            <span th:if="${book.status.name() == 'AVAILABLE'}" class="badge bg-success">Available</span>
            <span th:if="${book.status.name() == 'RESERVED'}" class="badge bg-danger">Reserved</span>
        </td>
        <td th:text="${book.reservedBy}"></td>
        <td th:text="${book.reservationStart}"></td>
        <td th:text="${book.reservationEnd}"></td>
        <td>
            <button class="btn btn-sm btn-danger"
                    th:onclick="'deleteBook(' + ${book.id} + ')'">Delete</button>
            <button th:if="${book.status.name() == 'RESERVED'}"
                    class="btn btn-sm btn-warning"
                    th:onclick="'cancelReservation(' + ${book.id} + ')'">Cancel Reservation</button>
        </td>
    </tr>
    </tbody>
</table>

<!-- USERS TABLE -->
<h4 class="mt-5">Registered Users</h4>
<table class="table table-bordered">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.username}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.role}"></td>
        <td>
            <button class="btn btn-sm btn-danger"
                    th:onclick="'deleteUser(' + ${user.id} + ')'">Delete</button>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function addBook() {
        const title = document.getElementById('newTitle').value;
        const author = document.getElementById('newAuthor').value;
        const category = document.getElementById('newCategory').value;

        fetch('/api/books', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, author, category })
        }).then(res => { if (res.ok) location.reload(); });
    }

    function deleteBook(id) {
        if (confirm('Delete this book?')) {
            fetch(`/api/books/${id}`, { method: 'DELETE' })
                .then(res => { if (res.ok) location.reload(); });
        }
    }

    function cancelReservation(id) {
        if (confirm('Cancel this reservation?')) {
            fetch(`/api/books/${id}/cancel`, { method: 'PATCH' })
                .then(res => { if (res.ok) location.reload(); });
        }
    }

    function deleteUser(id) {
        if (confirm('Delete this user?')) {
            fetch(`/users/${id}`, { method: 'DELETE' })
                .then(res => { if (res.ok) location.reload(); });
        }
    }

    document.getElementById('searchInput').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        document.querySelectorAll('#booksTable tr').forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
        });
    });
</script>
</body>
</html>
